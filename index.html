<!DOCTYPE html>
<html lang="lt">
<head>
<meta charset="UTF-8">
<title>Heart O+G center</title>

<style>
body {
    margin: 0;
    background: black;
    overflow: hidden;
    font-family: monospace;
}

canvas {
    display: block;
}
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let t = 0;

function heartFunction(a) {
    let x = 16 * Math.pow(Math.sin(a), 3);
    let y = 13 * Math.cos(a)
        - 5 * Math.cos(2 * a)
        - 2 * Math.cos(3 * a)
        - Math.cos(4 * a);
    return { x, y };
}

function draw() {
    ctx.fillStyle = "black";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    let scale = 15 + Math.sin(t) * 2;

    // Širdelės tekstas
    ctx.fillStyle = "#ff7a7a";
    ctx.font = "14px monospace";

    for (let i = 0; i < Math.PI * 2; i += 0.08) {
        let pos = heartFunction(i);

        let x = canvas.width / 2 + pos.x * scale;
        let y = canvas.height / 2 - pos.y * scale;

        ctx.fillText("I love you", x, y);
    }

    // VIDURYS - O+G
    ctx.fillStyle = "#ffffff";
    ctx.font = "bold 80px monospace";
    ctx.textAlign = "center";

    // pulsavimas tekstui
    let pulse = 1 + Math.sin(t * 2) * 0.1;

    ctx.save();
    ctx.translate(canvas.width / 2, canvas.height / 2);
    ctx.scale(pulse, pulse);
    ctx.fillText("O+G", 0, 20);
    ctx.restore();

    t += 0.05;
    requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
