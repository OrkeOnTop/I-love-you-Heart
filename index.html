<!DOCTYPE html>
<html lang="lt">
<head>
<meta charset="UTF-8">
<title>O+G Heart</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: monospace;

    /* FONAS */
    background-image: url("foto.jpg"); /* pakeisk į savo foto pavadinimą */
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
}

/* tamsus overlay kad tekstas matytųsi */
body::after {
    content: "";
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.3);
}
canvas {
    position: relative;
    z-index: 1;
    display: block;
}
</style>
</head>

<body>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let t = 0;

function heartFunction(a) {
    let x = 16 * Math.pow(Math.sin(a), 3);
    let y = 13 * Math.cos(a)
        - 5 * Math.cos(2 * a)
        - 2 * Math.cos(3 * a)
        - Math.cos(4 * a);
    return { x, y };
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    let scale = 15 + Math.sin(t) * 2;

    // širdelė iš "I love you"
    ctx.fillStyle = "#ff7a7a";
    ctx.font = "14px monospace";

    for (let i = 0; i < Math.PI * 2; i += 0.08) {
        let pos = heartFunction(i);

        let x = canvas.width / 2 + pos.x * scale;
        let y = canvas.height / 2 - pos.y * scale;

        ctx.fillText("I love you", x, y);
    }

    // vidurys O+G
    ctx.fillStyle = "#ffffff";
    ctx.font = "bold 80px monospace";
    ctx.textAlign = "center";

    let pulse = 1 + Math.sin(t * 2) * 0.1;

    ctx.save();
    ctx.translate(canvas.width / 2, canvas.height / 2);
    ctx.scale(pulse, pulse);
    ctx.fillText("O+G", 0, 20);
    ctx.restore();

    t += 0.05;
    requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
